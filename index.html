<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA do 3DS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        .chat-container {
            height: calc(100vh - 180px);
        }
        .typing-dots span {
            animation: blink 1.4s infinite both;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

<div class="max-w-4xl mx-auto px-4 py-6 h-screen flex flex-col">
    
    <header class="flex items-center justify-between mb-6 px-4 py-3 glass-effect rounded-2xl shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                🤖
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">IA do 3DS</h1>
                <p class="text-xs text-indigo-600 font-medium">Modo offline</p>
            </div>
        </div>
    </header>

    <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2 chat-container scroll-smooth">
        <div class="flex justify-start">
            <div class="max-w-[85%] bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100">
                <p class="text-slate-700">Olá! Eu sou a <b>IA do 3DS</b>. Como posso ajudar você agora?</p>
            </div>
        </div>
    </div>

    <div id="error-box" class="hidden mb-4 p-3 bg-red-100 border border-red-200 text-red-700 text-sm rounded-lg text-center"></div>

    <div class="glass-effect p-4 rounded-2xl shadow-md">
        <form id="chat-form" class="flex gap-2">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Digite sua pergunta aqui..." 
                required
                class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-700"
                autocomplete="off"
            >
            <button 
                type="submit" 
                id="send-btn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            >
                ➤
            </button>
        </form>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const errorBox = document.getElementById('error-box');

    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
        
        const innerDiv = document.createElement('div');
        innerDiv.className = `max-w-[85%] p-4 rounded-2xl shadow-sm ${
            isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-700 rounded-tl-none border border-slate-100'
        }`;
        
        innerDiv.innerHTML = `<p class="whitespace-pre-wrap">${text}</p>`;
        div.appendChild(innerDiv);
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showLoading() {
        const div = document.createElement('div');
        div.id = 'loading-indicator';
        div.className = 'flex justify-start';
        div.innerHTML = `
            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-slate-400">
                <div class="typing-dots flex gap-1"><span>●</span><span>●</span><span>●</span></div>
            </div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeLoading() {
        const loader = document.getElementById('loading-indicator');
        if (loader) loader.remove();
    }

    // IA LOCAL (funciona no GitHub Pages)
    function fakeAI(userText) {
        const text = userText.toLowerCase();

        if (text.includes("oi") || text.includes("olá")) {
            return "Olá! Como posso te ajudar?";
        }
        if (text.includes("nome")) {
            return "Eu sou a IA do 3DS 😄";
        }
        if (text.includes("hora")) {
            return "Agora são " + new Date().toLocaleTimeString();
        }
        if (text.includes("data")) {
            return "Hoje é " + new Date().toLocaleDateString();
        }

        const respostas = [
            "Interessante! Me conta mais.",
            "Entendi 👍",
            "Pode explicar melhor?",
            "Boa pergunta!",
            "Hmm... interessante."
        ];

        return respostas[Math.floor(Math.random() * respostas.length)];
    }

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;

        errorBox.classList.add('hidden');
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        addMessage(text, true);
        showLoading();

        setTimeout(() => {
            removeLoading();
            const response = fakeAI(text);
            addMessage(response, false);

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }, 800);
    });
</script>

</body>
</html>
